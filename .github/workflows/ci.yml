name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install intron
        run: |
          curl -fsSL https://raw.githubusercontent.com/misut/intron/main/install.sh | sh
          echo "$HOME/.intron/bin" >> $GITHUB_PATH

      - name: Install toolchain
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          intron default llvm 22.1.2
          intron default cmake 4.3.1
          intron default ninja 1.13.2

      - name: Bootstrap build
        run: |
          LLVM_ROOT="$HOME/.intron/toolchains/llvm/22.1.2"
          CMAKE="$HOME/.intron/toolchains/cmake/4.3.1/bin/cmake"
          $CMAKE -B build -G Ninja \
            -DCMAKE_CXX_COMPILER="$LLVM_ROOT/bin/clang++" \
            -DCMAKE_CXX_STDLIB_MODULES_JSON="$LLVM_ROOT/lib/libc++.modules.json" \
            -DCMAKE_MAKE_PROGRAM="$HOME/.intron/toolchains/ninja/1.13.2/ninja"
          $CMAKE --build build

      - name: Self-host build
        run: |
          export PATH="$HOME/.intron/toolchains/llvm/22.1.2/bin:$HOME/.intron/toolchains/cmake/4.3.1/bin:$HOME/.intron/toolchains/ninja/1.13.2:$PATH"
          ./build/exon build

      - name: Verify
        run: .exon/debug/exon info
