name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitignore"
      - "mise.toml"
      - ".intron.toml"
      - ".claude/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitignore"
      - "mise.toml"
      - ".intron.toml"
      - ".claude/**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache toolchains
        uses: actions/cache@v4
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-llvm22.1.2-cmake4.3.1-ninja1.13.2

      - name: Install intron
        run: |
          gh release download v0.14.0 -R misut/intron -p "intron-*-${{ matrix.platform }}.tar.gz"
          tar xzf intron-*.tar.gz && rm intron-*.tar.gz
          mkdir -p "$HOME/.intron/bin" && mv intron "$HOME/.intron/bin/"
          echo "$HOME/.intron/bin" >> $GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          if [ "$(uname -m)" = "aarch64" ] && [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ninja-build
          else
            intron install ninja 1.13.2
          fi

      - name: Bootstrap build
        run: |
          eval "$(intron env)"
          LLVM_ROOT="$HOME/.intron/toolchains/llvm/22.1.2"
          MODULES_JSON=$(find "$LLVM_ROOT" -name "libc++.modules.json" -print -quit)
          CMAKE_ARGS="-Wno-dev -B build -G Ninja"
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_COMPILER=$LLVM_ROOT/bin/clang++"
          if [ -n "$MODULES_JSON" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_STDLIB_MODULES_JSON=$MODULES_JSON"
          fi
          if [ "$RUNNER_OS" = "macOS" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_OSX_SYSROOT=$(xcrun --show-sdk-path)"
          fi
          if [ "$RUNNER_OS" = "Linux" ]; then
            LIBCXX_DIR=$(dirname "$(find "$LLVM_ROOT" -name "libc++.so" -print -quit)")
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_FLAGS=-stdlib=libc++"
            CMAKE_ARGS="$CMAKE_ARGS \"-DCMAKE_EXE_LINKER_FLAGS=-stdlib=libc++ -lc++abi -Wl,-rpath,$LIBCXX_DIR\""
          fi
          eval cmake $CMAKE_ARGS
          cmake --build build --target exon

      - name: Self-host build
        run: |
          eval "$(intron env)"
          if [ "$RUNNER_OS" = "Linux" ]; then
            LLVM_ROOT="$HOME/.intron/toolchains/llvm/22.1.2"
            export LD_LIBRARY_PATH="$(dirname "$(find "$LLVM_ROOT" -name "libc++.so" -print -quit)"):${LD_LIBRARY_PATH:-}"
          fi
          ./build/exon build

      - name: Self-host test
        run: |
          eval "$(intron env)"
          .exon/debug/exon test

      - name: Verify
        run: .exon/debug/exon info

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install intron
        shell: pwsh
        run: |
          iwr -useb https://raw.githubusercontent.com/misut/intron/main/install.ps1 | iex
          echo "$env:USERPROFILE\.intron\bin" >> $env:GITHUB_PATH

      - name: Install toolchains
        shell: pwsh
        run: |
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          echo "$env:USERPROFILE\.intron\toolchains\cmake\4.3.1\bin" >> $env:GITHUB_PATH
          echo "$env:USERPROFILE\.intron\toolchains\ninja\1.13.2" >> $env:GITHUB_PATH

      - name: Bootstrap build
        shell: cmd
        run: |
          cmake -B build -G Ninja
          cmake --build build --target exon

      - name: Self-host build
        shell: cmd
        run: .\build\exon.exe build

      - name: Self-host test
        shell: cmd
        run: .\.exon\debug\exon.exe test

      - name: Verify
        shell: cmd
        run: .\.exon\debug\exon.exe info
