name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install llvm ninja

      - name: Install intron
        run: |
          curl -fsSL https://raw.githubusercontent.com/misut/intron/main/install.sh | sh
          echo "$HOME/.intron/bin" >> $GITHUB_PATH

      - name: Install toolchain
        run: |
          intron install llvm 22.1.2

      - name: Bootstrap build
        run: |
          LLVM_ROOT="$HOME/.intron/toolchains/llvm/22.1.2"
          cmake -B build -G Ninja \
            -DCMAKE_CXX_COMPILER="$LLVM_ROOT/bin/clang++" \
            -DCMAKE_CXX_STDLIB_MODULES_JSON="$LLVM_ROOT/lib/libc++.modules.json"
          cmake --build build

      - name: Self-host build
        run: |
          export PATH="$HOME/.intron/toolchains/llvm/22.1.2/bin:$PATH"
          ./build/exon build

      - name: Verify
        run: .exon/debug/exon info
