name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install intron
        run: |
          gh release download v0.7.0 -R misut/intron -p "intron-*-${{ matrix.platform }}.tar.gz"
          tar xzf intron-*.tar.gz && rm intron-*.tar.gz
          mkdir -p "$HOME/.intron/bin" && mv intron "$HOME/.intron/bin/"
          echo "$HOME/.intron/bin" >> $GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          if [ "$(uname -m)" = "aarch64" ] && [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ninja-build
          else
            intron install ninja 1.13.2
          fi

      - name: Bootstrap build
        run: |
          eval "$(intron env)"
          LLVM_ROOT="$HOME/.intron/toolchains/llvm/22.1.2"
          MODULES_JSON=$(find "$LLVM_ROOT" -name "libc++.modules.json" -print -quit)
          git clone https://github.com/misut/tomlcpp.git /tmp/tomlcpp
          CMAKE_ARGS="-Wno-dev -B build -S .github/cmake -G Ninja"
          CMAKE_ARGS="$CMAKE_ARGS -DTOMLCPP_DIR=/tmp/tomlcpp"
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_COMPILER=$LLVM_ROOT/bin/clang++"
          if [ -n "$MODULES_JSON" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_STDLIB_MODULES_JSON=$MODULES_JSON"
          fi
          if [ "$RUNNER_OS" = "macOS" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_OSX_SYSROOT=$(xcrun --show-sdk-path)"
          fi
          if [ "$RUNNER_OS" = "Linux" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_FLAGS=-stdlib=libc++"
            CMAKE_ARGS="$CMAKE_ARGS \"-DCMAKE_EXE_LINKER_FLAGS=-stdlib=libc++ -lc++abi -Wl,-rpath,$LLVM_ROOT/lib\""
          fi
          eval cmake $CMAKE_ARGS
          cmake --build build

      - name: Self-host build
        run: |
          eval "$(intron env)"
          ./build/exon build

      - name: Self-host test
        run: |
          eval "$(intron env)"
          .exon/debug/exon test

      - name: Verify
        run: .exon/debug/exon info
