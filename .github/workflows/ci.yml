name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitignore"
      - ".claude/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
      - ".editorconfig"
      - ".gitignore"
      - ".claude/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Restore toolchains
        id: toolchain-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.intron/toolchains
          key: intron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml', '.intron.toml') }}

      - name: Install intron
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-${{ matrix.platform }}.tar.gz"
          tar xzf intron-*.tar.gz && rm intron-*.tar.gz
          mkdir -p "$HOME/.intron/bin" && mv intron "$HOME/.intron/bin/"
          echo "$HOME/.intron/bin" >> $GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install released seed exon
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-${{ matrix.platform }}.tar.gz"
          tar xzf exon-*.tar.gz && rm exon-*.tar.gz
          mkdir -p "$HOME/.exon/seed/bin" && mv exon "$HOME/.exon/seed/bin/"
          touch "$HOME/.exon/seed/bin/exon"
          echo "$HOME/.exon/seed/bin" >> $GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: intron install

      - name: Diagnose toolchain
        run: intron status --output json

      - name: Save toolchains
        if: github.ref == 'refs/heads/main' && steps.toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.intron/toolchains
          key: ${{ steps.toolchain-cache.outputs.cache-primary-key }}

      - name: Seed self-host build
        run: |
          eval "$(intron env)"
          if [ "$RUNNER_OS" = "Linux" ]; then
            LLVM_ROOT="$HOME/.intron/toolchains/llvm/22.1.2"
            export LD_LIBRARY_PATH="$(dirname "$(find "$LLVM_ROOT" -name "libc++.so" -print -quit)"):${LD_LIBRARY_PATH:-}"
          fi
          exon build

      - name: Current-source self-host build
        run: |
          eval "$(intron env)"
          if [ "$RUNNER_OS" = "Linux" ]; then
            LLVM_ROOT="$HOME/.intron/toolchains/llvm/22.1.2"
            export LD_LIBRARY_PATH="$(dirname "$(find "$LLVM_ROOT" -name "libc++.so" -print -quit)"):${LD_LIBRARY_PATH:-}"
          fi
          ./.exon/debug/exon build

      - name: Self-host test
        run: |
          eval "$(intron env)"
          .exon/debug/exon test

      - name: Self-host release build
        if: runner.os == 'macOS'
        run: |
          eval "$(intron env)"
          ./.exon/debug/exon build --release

      - name: Verify
        run: .exon/debug/exon info

      - name: Verify release
        if: runner.os == 'macOS'
        run: .exon/release/exon info

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Install intron
        shell: pwsh
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-x86_64-pc-windows-msvc.zip"
          Expand-Archive -Path intron-*.zip -DestinationPath .
          Remove-Item intron-*.zip
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.intron\bin" | Out-Null
          Move-Item -Path intron.exe -Destination "$env:USERPROFILE\.intron\bin\intron.exe"
          echo "$env:USERPROFILE\.intron\bin" >> $env:GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install released seed exon
        shell: pwsh
        run: |
          gh release download v${{ steps.tool-versions.outputs.exon }} -R misut/exon -p "exon-*-x86_64-pc-windows-msvc.zip"
          Expand-Archive -Path exon-*.zip -DestinationPath .
          Remove-Item exon-*.zip
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.exon\seed\bin" | Out-Null
          Move-Item -Path exon.exe -Destination "$env:USERPROFILE\.exon\seed\bin\exon.exe"
          (Get-Item "$env:USERPROFILE\.exon\seed\bin\exon.exe").LastWriteTime = Get-Date
          echo "$env:USERPROFILE\.exon\seed\bin" >> $env:GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        shell: pwsh
        run: |
          intron install
          echo "$env:USERPROFILE\.intron\toolchains\cmake\4.3.1\bin" >> $env:GITHUB_PATH
          echo "$env:USERPROFILE\.intron\toolchains\ninja\1.13.2" >> $env:GITHUB_PATH

      - name: Diagnose toolchain
        shell: pwsh
        run: intron status --output json

      - name: Seed self-host build
        shell: pwsh
        run: |
          Invoke-Expression (& intron env | Out-String)
          exon build

      - name: Current-source self-host build
        shell: pwsh
        run: |
          Invoke-Expression (& intron env | Out-String)
          .\.exon\debug\exon.exe build

      - name: Self-host test
        shell: pwsh
        run: |
          Invoke-Expression (& intron env | Out-String)
          .\.exon\debug\exon.exe test --timeout 60

      - name: Windows ASan smoke
        shell: pwsh
        run: |
          Invoke-Expression (& intron env | Out-String)
          $smoke = Join-Path $env:RUNNER_TEMP "exon-asan-smoke"
          Remove-Item -LiteralPath $smoke -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path (Join-Path $smoke "src") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $smoke "tests") | Out-Null

          $manifest = @(
            '[package]'
            'name = "asan-smoke"'
            'version = "0.1.0"'
            'type = "bin"'
            'standard = 23'
            ''
            '[target.''cfg(os = "windows")''.build]'
            'cxxflags = ["/fsanitize=address"]'
            'ldflags = ["/fsanitize=address"]'
          ) -join "`n"
          $manifest | Set-Content -LiteralPath (Join-Path $smoke "exon.toml") -Encoding utf8NoBOM

          'int main() { return 0; }' | Set-Content -LiteralPath (Join-Path $smoke "src\\main.cpp") -Encoding utf8NoBOM
          'int main() { return 0; }' | Set-Content -LiteralPath (Join-Path $smoke "tests\\smoke.cpp") -Encoding utf8NoBOM

          Push-Location $smoke
          try {
            & "$env:GITHUB_WORKSPACE\\.exon\debug\exon.exe" test --timeout 60
            if (-not (Test-Path ".\.exon\debug\clang_rt.asan_dynamic-x86_64.dll")) {
              throw "clang_rt.asan_dynamic-x86_64.dll was not copied next to the test executable"
            }
            & ".\.exon\debug\test-smoke.exe"
          } finally {
            Pop-Location
          }

      - name: Verify
        shell: pwsh
        run: .\.exon\debug\exon.exe info
