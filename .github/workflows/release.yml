name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Install intron
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-${{ matrix.platform }}.tar.gz"
          tar xzf intron-*.tar.gz && rm intron-*.tar.gz
          mkdir -p "$HOME/.intron/bin" && mv intron "$HOME/.intron/bin/"
          echo "$HOME/.intron/bin" >> $GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          intron install ninja 1.13.2

      - name: Bootstrap and release build
        run: |
          bash scripts/bootstrap.sh
          eval "$(intron env)"
          if [ "$RUNNER_OS" = "Linux" ]; then
            LLVM_ROOT="$HOME/.intron/toolchains/llvm/22.1.2"
            export LD_LIBRARY_PATH="$(dirname "$(find "$LLVM_ROOT" -name "libc++.so" -print -quit)"):${LD_LIBRARY_PATH:-}"
          fi
          ./build/exon build --release
          ./.exon/release/exon info

      - name: Package
        run: |
          tar -czf exon-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz \
            -C .exon/release exon

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: exon-${{ matrix.platform }}
          path: exon-*.tar.gz
          retention-days: 1
          compression-level: 0

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tool versions
        id: tool-versions
        shell: bash
        run: |
          sed -n 's/^"vfox:misut\/mise-intron"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/intron=\1/p' mise.toml >> "$GITHUB_OUTPUT"
          sed -n 's/^"vfox:misut\/mise-exon"[[:space:]]*=[[:space:]]*"\([^"]*\)"$/exon=\1/p' mise.toml >> "$GITHUB_OUTPUT"

      - name: Install intron
        shell: pwsh
        run: |
          gh release download v${{ steps.tool-versions.outputs.intron }} -R misut/intron -p "intron-*-x86_64-pc-windows-msvc.zip"
          Expand-Archive -Path intron-*.zip -DestinationPath .
          Remove-Item intron-*.zip
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.intron\bin" | Out-Null
          Move-Item -Path intron.exe -Destination "$env:USERPROFILE\.intron\bin\intron.exe"
          echo "$env:USERPROFILE\.intron\bin" >> $env:GITHUB_PATH
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install toolchains
        shell: pwsh
        run: |
          intron install cmake 4.3.1
          intron install ninja 1.13.2
          echo "$env:USERPROFILE\.intron\toolchains\cmake\4.3.1\bin" >> $env:GITHUB_PATH
          echo "$env:USERPROFILE\.intron\toolchains\ninja\1.13.2" >> $env:GITHUB_PATH

      - name: Bootstrap and release build
        shell: pwsh
        run: |
          Invoke-Expression (& intron env | Out-String)
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target exon
          .\build\exon.exe build --release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path .exon/release/exon.exe -DestinationPath exon-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: exon-x86_64-pc-windows-msvc
          path: exon-*.zip
          retention-days: 1
          compression-level: 0

  release:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            exon-*.tar.gz
            exon-*.zip
          generate_release_notes: true

  self-bump:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.BUMP_BOT_TOKEN }}

      - name: Resolve version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Detect current version
        id: old
        run: |
          OLD=$(grep "vfox:misut/mise-exon" mise.toml \
            | grep -oP '= "\K[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$OLD" >> "$GITHUB_OUTPUT"

      - name: Update mise.toml
        run: |
          OLD="${{ steps.old.outputs.version }}"
          sed -i "s|\"vfox:misut/mise-exon\" = \"${OLD}\"|\"vfox:misut/mise-exon\" = \"${VERSION}\"|" mise.toml

      - name: Regenerate CMakeLists.txt
        run: |
          gh release download "v${VERSION}" -R misut/exon -p "exon-*-x86_64-linux-gnu.tar.gz"
          tar xzf exon-*.tar.gz && rm exon-*.tar.gz
          chmod +x exon && mv exon /usr/local/bin/
          exon sync
        env:
          GH_TOKEN: ${{ secrets.BUMP_BOT_TOKEN }}

      - name: Create and auto-merge PR
        run: |
          BRANCH="chore/bump-exon-v${VERSION}"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --author "misut <pkr5207@gmail.com>" -m "chore: bump exon to v${VERSION}"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git push --force origin "HEAD:$BRANCH"
          else
            git push origin "$BRANCH"
          fi
          PR_URL=$(gh pr list --head "$BRANCH" --state open --json url --jq '.[0].url // empty')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --title "chore: bump exon to v${VERSION}" \
              --body "Automated bump triggered by [exon v${VERSION}](https://github.com/misut/exon/releases/tag/v${VERSION})." \
              --base main \
              --head "$BRANCH")
          fi
          gh pr merge "$PR_URL" --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.BUMP_BOT_TOKEN }}

  notify:
    needs: [release]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [intron, txn, cppx, phenotype, jsoncpp, tomlcpp]
    steps:
      - name: Dispatch bump to ${{ matrix.repo }}
        run: |
          gh api repos/misut/${{ matrix.repo }}/dispatches \
            -f event_type=bump-tool \
            -f 'client_payload[tool]=exon' \
            -f "client_payload[version]=${GITHUB_REF_NAME#v}"
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
