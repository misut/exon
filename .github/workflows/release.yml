name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install llvm ninja

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y libc++-20-dev libc++abi-20-dev ninja-build
          pip install cmake --break-system-packages

      - name: Bootstrap and release build
        run: |
          git clone https://github.com/misut/tomlcpp.git /tmp/tomlcpp
          if [ "$RUNNER_OS" = "macOS" ]; then
            LLVM_PREFIX=$(brew --prefix llvm)
            CXX="$LLVM_PREFIX/bin/clang++"
            MODULES_JSON="$LLVM_PREFIX/lib/c++/libc++.modules.json"
            LINKER_FLAGS="-L$LLVM_PREFIX/lib/c++ -lc++ -lc++abi -L$LLVM_PREFIX/lib/unwind -lunwind"
          else
            CXX=clang++-20
            MODULES_JSON=/usr/lib/llvm-20/lib/libc++.modules.json
            CXX_FLAGS="-stdlib=libc++"
            LINKER_FLAGS="-stdlib=libc++ -lc++abi"
          fi
          cmake -B build -S .github/cmake -G Ninja \
            -DTOMLCPP_DIR=/tmp/tomlcpp \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_CXX_STDLIB_MODULES_JSON="$MODULES_JSON" \
            -DCMAKE_CXX_FLAGS="${CXX_FLAGS:-}" \
            -DCMAKE_EXE_LINKER_FLAGS="$LINKER_FLAGS"
          cmake --build build
          if [ "$RUNNER_OS" = "macOS" ]; then
            export PATH="$(brew --prefix llvm)/bin:$PATH"
          else
            export PATH="/usr/lib/llvm-20/bin:$PATH"
          fi
          ./build/exon build --release

      - name: Package
        run: |
          tar -czf exon-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz \
            -C .exon/release exon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exon-${{ matrix.platform }}
          path: exon-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: exon-*.tar.gz
          generate_release_notes: true
