name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install llvm ninja

      - name: Install intron
        run: |
          curl -fsSL https://raw.githubusercontent.com/misut/intron/main/install.sh | sh
          echo "$HOME/.intron/bin" >> $GITHUB_PATH

      - name: Install toolchain
        run: intron install llvm 22.1.2

      - name: Bootstrap build
        run: |
          LLVM_ROOT="$HOME/.intron/toolchains/llvm/22.1.2"
          cmake -B build -G Ninja \
            -DCMAKE_CXX_COMPILER="$LLVM_ROOT/bin/clang++" \
            -DCMAKE_CXX_STDLIB_MODULES_JSON="$LLVM_ROOT/lib/libc++.modules.json"
          cmake --build build

      - name: Self-host release build
        run: |
          export PATH="$HOME/.intron/toolchains/llvm/22.1.2/bin:$PATH"
          ./build/exon build --release

      - name: Package
        run: |
          tar -czf exon-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz \
            -C .exon/release exon

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: exon-*.tar.gz
          generate_release_notes: true
