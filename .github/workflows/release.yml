name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: aarch64-apple-darwin
          - os: ubuntu-24.04
            platform: x86_64-linux-gnu
          - os: ubuntu-24.04-arm
            platform: aarch64-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install intron
        run: |
          curl -fsSL https://raw.githubusercontent.com/misut/intron/main/install.sh | sh
          echo "$HOME/.intron/bin" >> $GITHUB_PATH

      - name: Install toolchains
        run: |
          intron install llvm 22.1.2
          intron install cmake 4.3.1
          intron install ninja 1.13.2

      - name: Bootstrap and release build
        run: |
          eval "$(intron env)"
          LLVM_ROOT="$HOME/.intron/toolchains/llvm/22.1.2"
          git clone https://github.com/misut/tomlcpp.git /tmp/tomlcpp
          CMAKE_ARGS="-Wno-dev -B build -S .github/cmake -G Ninja"
          CMAKE_ARGS="$CMAKE_ARGS -DTOMLCPP_DIR=/tmp/tomlcpp"
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_COMPILER=$LLVM_ROOT/bin/clang++"
          CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_STDLIB_MODULES_JSON=$LLVM_ROOT/lib/libc++.modules.json"
          if [ "$RUNNER_OS" = "Linux" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_CXX_FLAGS=-stdlib=libc++"
            CMAKE_ARGS="$CMAKE_ARGS \"-DCMAKE_EXE_LINKER_FLAGS=-stdlib=libc++ -lc++abi\""
          fi
          eval cmake $CMAKE_ARGS
          cmake --build build
          ./build/exon build --release

      - name: Package
        run: |
          tar -czf exon-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz \
            -C .exon/release exon

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: exon-${{ matrix.platform }}
          path: exon-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: exon-*.tar.gz
          generate_release_notes: true
