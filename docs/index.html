<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>exon — C++ Package Manager</title>
    <style>
        :root {
            --bg: #fafafa;
            --fg: #1a1a1a;
            --accent: #2563eb;
            --muted: #6b7280;
            --border: #e5e7eb;
            --code-bg: #f3f4f6;
            --hero-bg: #1e293b;
            --hero-fg: #f8fafc;
            --max-w: 720px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.6;
        }

        .hero {
            background: var(--hero-bg);
            color: var(--hero-fg);
            padding: 3rem 1.5rem;
            text-align: center;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .subtitle {
            margin-top: 0.5rem;
            font-size: 1.15rem;
            color: #94a3b8;
        }

        .content {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        section { margin-bottom: 2.5rem; }

        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            padding-bottom: 0.35rem;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
        }

        p { margin-bottom: 0.75rem; }

        ul {
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }
        li { margin-bottom: 0.35rem; }

        pre.code-block {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
            margin-bottom: 1rem;
        }
        code {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.9em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }
        th, td {
            text-align: left;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        th {
            font-weight: 600;
            background: var(--code-bg);
        }
        td code {
            background: var(--code-bg);
            padding: 0.15em 0.4em;
            border-radius: 3px;
            white-space: nowrap;
        }

        footer {
            text-align: center;
            padding: 2rem 1.5rem;
            color: var(--muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
        }
        footer a {
            color: var(--accent);
            text-decoration: none;
        }
        footer a:hover { text-decoration: underline; }
        a { color: var(--accent); }
    </style>
</head>
<body>
    <script type="module">
        import { mount } from './phenotype.js';
        mount('docs.wasm');
    </script>
</body>
</html>
